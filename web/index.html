<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>auth-min — 로그인/로그아웃 데모 + OTP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="./css/styles.css" />
</head>
<body>
  <main class="container">
    <h1>auth-min</h1>
    <p class="hint">
      ※ 개발 팁: <code>web</code> 폴더에서 <code>python -m http.server 5500</code> 로 띄우고,<br />
      API 서버는 <code>http://localhost:8000</code> 에서 CORS(allow_credentials) 허용해 주세요.
    </p>

    <!-- 세션 상태 -->
    <section class="card" id="statusCard">
      <h2>세션 상태</h2>
      <div id="meBox" class="mono">확인 중...</div>
      <div class="row gap">
        <button id="btnRefresh" type="button" class="btn">상태 새로고침</button>
        <button id="btnLogout" type="button" class="btn btn-outline">로그아웃</button>
      </div>
      <div id="outMsg" class="mono small"></div>
    </section>

    <!-- 로그인 (1단계: 비밀번호) -->
    <section class="card">
      <h2>로그인</h2>
      <label for="email">이메일</label>
      <input id="email" type="email" placeholder="you@example.com" required />
      <label for="password">비밀번호</label>
      <input id="password" type="password" placeholder="••••••••••" required />
      <button id="btnLogin" type="button" class="btn btn-primary">로그인</button>
      <div id="loginMsg" class="mono small"></div>
    </section>

    <!-- 로그인 (2단계: OTP) -->
    <section class="card" id="mfaBox" style="display:none">
      <h2>2단계 인증</h2>
      <label for="otpCode">OTP 코드 (6자리)</label>
      <input id="otpCode" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="123456" />
      <div class="row gap">
        <button id="btnOtp" type="button" class="btn btn-primary">OTP 확인</button>
      </div>
      <div id="mfaMsg" class="mono small"></div>
    </section>

    <!-- 회원가입 -->
    <section class="card">
      <h2>회원가입</h2>

      <!-- 1단계: 이메일/비번 -->
      <div id="regStepEmail">
        <label for="regEmail">이메일</label>
        <input id="regEmail" type="email" placeholder="you@example.com" required />
        <label for="regPassword">비밀번호 (최소 10자)</label>
        <input id="regPassword" type="password" placeholder="••••••••••" required />
        <button id="btnRegisterStart" type="button" class="btn">회원가입 시작</button>
        <div id="regMsg" class="mono small"></div>
      </div>

      <!-- 2단계: 이메일 인증코드 -->
      <div id="regStepCode" style="display:none">
        <label for="regEmailCode">이메일 인증코드(6자리)</label>
        <input id="regEmailCode" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="123456" />
        <button id="btnVerifyEmailCode" type="button" class="btn">인증코드 확인</button>
        <div id="regCodeMsg" class="mono small"></div>
      </div>
    </section>

    <!-- 3단계: TOTP 등록/첫 OTP 검증 -->
    <section class="card" id="totpBox" style="display:none">
      <h2>OTP(TOTP) 등록</h2>
      <p class="small">QR을 스캔하고, 앱의 6자리 코드를 입력해 완료하세요.</p>
      <div id="totpInfo" class="mono small"></div>
      <div id="qrBox" style="margin:8px 0;"></div>
      <div class="mono small">
        <div>SECRET: <span id="totpSecret"></span></div>
        <div>URI: <a id="totpUrl" href="#" target="_blank" rel="noopener"></a></div>
      </div>
      <label for="totpActivateCode">앱에 표시된 코드</label>
      <input id="totpActivateCode" type="text" inputmode="numeric" pattern="[0-9]*" placeholder="123456" />
      <button id="btnActivateTotp" type="button" class="btn btn-primary">가입 완료</button>
      <div id="totpActivateMsg" class="mono small"></div>
      <h3 style="margin-top:16px">백업코드</h3>
      <div id="backupList" class="mono small"></div>
    </section>
  </main>

  <!-- 스크립트는 바디 맨 끝에 -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <script src="./js/app.js?v=otp6"></script>
</body>
</html>
